<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafePark | Logout</title>
<link rel="icon" href="icons/logo.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="logout">

  <div class="logout-page">
    <div class="logout-card">
      <div class="icon-circle"><img src="icons/logout.svg" class="icon-lg" alt=""></div>
      <h2>You've been signed out</h2>
      <p>Your SafePark session has ended securely. Sign in again to access the dashboard.</p>
      <div class="logout-actions">
        <button class="btn btn-outline w-100" id="cancelLogoutBtn">Back to Dashboard</button>
        <button class="btn btn-primary w-100" id="confirmLogoutBtn">Go to Login</button>
      </div>
    </div>
  </div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
</body>
</html>
