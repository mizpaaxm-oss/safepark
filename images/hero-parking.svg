<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1c38"/>
      <stop offset="55%" stop-color="#123a68"/>
      <stop offset="100%" stop-color="#1c568f"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22334c"/>
      <stop offset="100%" stop-color="#16233a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3d8bff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3d8bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="500" fill="url(#skyGrad)"/>
  <rect width="1200" height="500" fill="url(#glow)"/>

  <!-- distant building silhouettes -->
  <g opacity="0.35" fill="#0a1c38">
    <rect x="40" y="150" width="70" height="180"/>
    <rect x="130" y="110" width="55" height="220"/>
    <rect x="1000" y="130" width="60" height="200"/>
    <rect x="1080" y="90" width="80" height="240"/>
  </g>

  <!-- ground / lot -->
  <rect x="0" y="330" width="1200" height="170" fill="url(#groundGrad)"/>

  <!-- lane markings -->
  <g stroke="#e8edf5" stroke-width="6" stroke-dasharray="26 22" opacity="0.5">
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- parking slot lines -->
  <g stroke="#ffffff" stroke-width="4" opacity="0.55">
    <line x1="650" y1="335" x2="620" y2="495"/>
    <line x1="760" y1="335" x2="760" y2="495"/>
    <line x1="870" y1="335" x2="900" y2="495"/>
    <line x1="980" y1="335" x2="1040" y2="495"/>
  </g>

  <!-- slot P markers -->
  <g fill="#8fb8ea" font-family="Poppins, sans-serif" font-size="26" font-weight="700" opacity="0.8">
    <text x="695" y="470">P2</text>
    <text x="820" y="470">P3</text>
    <text x="945" y="470">P4</text>
  </g>

  <!-- entry gate -->
  <g>
    <rect x="330" y="150" width="18" height="200" rx="4" fill="#e8edf5"/>
    <rect x="330" y="150" width="18" height="200" rx="4" fill="#ffffff" opacity="0.15"/>
    <rect x="200" y="230" width="140" height="14" rx="7" fill="#ffcc33" transform="rotate(-4 270 237)"/>
    <circle cx="345" cy="160" r="10" fill="#ff5b5b"/>
    <rect x="300" y="120" width="110" height="34" rx="6" fill="#0e2a4d" stroke="#3d8bff" stroke-width="2"/>
    <text x="355" y="143" text-anchor="middle" fill="#ffffff" font-family="Poppins, sans-serif" font-size="16" font-weight="600">ENTRY</text>
  </g>

  <!-- car entering -->
  <g transform="translate(60,330)">
    <ellipse cx="130" cy="118" rx="150" ry="14" fill="#000000" opacity="0.25"/>
    <path d="M10 95 Q20 55 55 50 L95 50 Q110 30 150 30 L200 30 Q230 30 240 55 L260 60 Q280 62 280 85 L280 95 Z" fill="#3d8bff"/>
    <path d="M95 50 Q112 36 150 36 L196 36 Q216 36 224 55 Z" fill="#bcdcff" opacity="0.8"/>
    <rect x="10" y="90" width="270" height="18" rx="9" fill="#1c568f"/>
    <circle cx="70" cy="112" r="24" fill="#0a1c38"/>
    <circle cx="70" cy="112" r="10" fill="#8fb8ea"/>
    <circle cx="220" cy="112" r="24" fill="#0a1c38"/>
    <circle cx="220" cy="112" r="10" fill="#8fb8ea"/>
    <rect x="252" y="66" width="10" height="8" rx="2" fill="#ffe066"/>
    <rect x="8" y="66" width="10" height="8" rx="2" fill="#ff5b5b"/>
  </g>

  <!-- motion lines -->
  <g stroke="#8fb8ea" stroke-width="4" stroke-linecap="round" opacity="0.5">
    <line x1="0" y1="405" x2="40" y2="405"/>
    <line x1="0" y1="425" x2="55" y2="425"/>
    <line x1="0" y1="445" x2="30" y2="445"/>
  </g>
</svg>
